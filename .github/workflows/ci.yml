name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run audit
      - run: pnpm run check
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:e2e
      - name: Smoke local
        run: |
          pnpm start &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3000/api/health && break
            sleep 1
          done
          SMOKE_URL=http://127.0.0.1:3000 pnpm run smoke

  postgres:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Postgres saved-plan tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret missing; skip"
            exit 0
          fi
          pnpm run test:postgres
