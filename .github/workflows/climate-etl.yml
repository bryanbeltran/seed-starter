name: Climate ETL

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

jobs:
  validate-etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run etl:climate
      - run: node scripts/check-data-quality.mjs
      - run: node scripts/check-climate-drift.mjs
      - run: node scripts/check-golden-climate.mjs
      - name: Upload climate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: climate-validate
          path: |
            data/climate-manifest.json
            data/golden-zips.json
